<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTM — Unit Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --bg2: #111114;
  --bg3: #18181d;
  --bg4: #1f1f26;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.15);
  --text: #e8e8ec;
  --text-muted: #6b6b78;
  --text-dim: #3a3a45;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);

  /* Element colors */
  --aegis:  #4fc3f7;
  --blitz:  #ffca28;
  --mystic: #ce93d8;
  --origin: #80cbc4;
  --ruin:   #ff7043;
  --veil:   #a5d6a7;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,12,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 2rem;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  flex-shrink: 0;
}

.logo span {
  color: var(--text-muted);
  font-weight: 400;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  margin-left: 0.75rem;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 280px;
}

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.35;
  pointer-events: none;
}

#search {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  padding: 7px 12px 7px 34px;
  outline: none;
  transition: border-color 0.2s;
}
#search::placeholder { color: var(--text-muted); }
#search:focus { border-color: var(--border-hover); }

.pill-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--border-hover); color: var(--text); }
.pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
}
.view-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 6px 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
}
.view-btn:hover { color: var(--text); background: var(--bg3); }
.view-btn.active { color: var(--accent); background: var(--accent-dim); }

/* ── MAIN ── */
main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.results-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 1.5rem;
  letter-spacing: 0.06em;
}
.results-meta span { color: var(--text-muted); }

/* ── GRID VIEW ── */
#grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.unit-card {
  background: var(--bg2);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
  aspect-ratio: 3/4;
  display: flex;
  flex-direction: column;
}
.unit-card:hover { background: var(--bg3); }

.card-img {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
  transition: transform 0.4s ease;
}
.unit-card:hover .card-img img { transform: scale(1.04); }

.card-img-placeholder {
  width: 100%;
  height: 100%;
  background: var(--bg4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.card-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, rgba(10,10,12,0.95) 0%, transparent 100%);
  pointer-events: none;
}

.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 12px 12px;
}

.card-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.1;
}

.card-role {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 2px;
  line-height: 1.3;
}

.card-badges {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.badge-element {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}

.badge-type {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.07);
  color: var(--text-muted);
}

/* ── LIST VIEW ── */
#list-view {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.list-header {
  display: grid;
  grid-template-columns: 200px 1fr 70px 70px 70px 70px 70px 70px 90px;
  gap: 0;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 0;
}

.list-col-head {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.list-col-head:hover { color: var(--text); }
.list-col-head.sorted { color: var(--accent); }
.list-col-head:not(:first-child) { justify-content: flex-end; }

.sort-arrow { opacity: 0.4; font-size: 0.6rem; }
.list-col-head.sorted .sort-arrow { opacity: 1; }

.list-row {
  display: grid;
  grid-template-columns: 200px 1fr 70px 70px 70px 70px 70px 70px 90px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  transition: background 0.1s;
}
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--bg3); }

.list-cell {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  font-size: 0.8rem;
}
.list-cell:not(:first-child):not(:nth-child(2)) {
  justify-content: flex-end;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

.list-unit-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.list-thumb {
  width: 36px;
  height: 36px;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg4);
}
.list-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.list-thumb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text-dim);
}

.list-unit-name {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
}

.stat-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  justify-content: flex-end;
}
.stat-bar {
  width: 36px;
  height: 3px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--border-hover);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border-hover);
  border-radius: 14px;
  width: 100%;
  max-width: 760px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform 0.25s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-hero {
  display: flex;
  gap: 0;
  height: 260px;
  position: relative;
  overflow: hidden;
  border-radius: 14px 14px 0 0;
}

.modal-hero-img {
  width: 220px;
  flex-shrink: 0;
  overflow: hidden;
}
.modal-hero-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.modal-hero-img-placeholder {
  width: 100%;
  height: 100%;
  background: var(--bg4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 3.5rem;
  font-weight: 800;
  color: var(--text-dim);
}

.modal-hero-content {
  flex: 1;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  border-left: 1px solid var(--border);
}

.modal-element-line {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.modal-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.2rem;
  line-height: 1;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.modal-role {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-weight: 300;
}

.modal-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.modal-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}

.modal-body {
  padding: 1.5rem;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.15s;
  z-index: 10;
}
.modal-close:hover { color: var(--text); border-color: var(--border-hover); }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 1.5rem;
}

.stat-block {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  text-align: center;
}
.stat-block-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.stat-block-val {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
}
.stat-block-base {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.stat-bars-section {
  margin-bottom: 1.5rem;
}

.stat-row-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.stat-row-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  width: 36px;
  flex-shrink: 0;
}
.stat-row-track {
  flex: 1;
  height: 5px;
  background: var(--bg4);
  border-radius: 3px;
  overflow: hidden;
}
.stat-row-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
}
.stat-row-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
}

.element-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.element-icon {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
}
.element-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.55;
}
.element-name-label {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  margin-bottom: 2px;
}

/* ── ELEMENT COLORS ── */
.el-aegis  { color: var(--aegis);  }
.el-blitz  { color: var(--blitz);  }
.el-mystic { color: var(--mystic); }
.el-origin { color: var(--origin); }
.el-ruin   { color: var(--ruin);   }
.el-veil   { color: var(--veil);   }

.bg-aegis  { background: rgba(79,195,247,0.12);  border-color: rgba(79,195,247,0.25);  }
.bg-blitz  { background: rgba(255,202,40,0.12);  border-color: rgba(255,202,40,0.25);  }
.bg-mystic { background: rgba(206,147,216,0.12); border-color: rgba(206,147,216,0.25); }
.bg-origin { background: rgba(128,203,196,0.12); border-color: rgba(128,203,196,0.25); }
.bg-ruin   { background: rgba(255,112,67,0.12);  border-color: rgba(255,112,67,0.25);  }
.bg-veil   { background: rgba(165,214,167,0.12); border-color: rgba(165,214,167,0.25); }

.icon-aegis  { background: rgba(79,195,247,0.18);  color: var(--aegis);  }
.icon-blitz  { background: rgba(255,202,40,0.18);  color: var(--blitz);  }
.icon-mystic { background: rgba(206,147,216,0.18); color: var(--mystic); }
.icon-origin { background: rgba(128,203,196,0.18); color: var(--origin); }
.icon-ruin   { background: rgba(255,112,67,0.18);  color: var(--ruin);   }
.icon-veil   { background: rgba(165,214,167,0.18); color: var(--veil);   }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.unit-card, .list-row {
  animation: fadeUp 0.3s ease both;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }


.kit-section { margin-top: 1.5rem; }
.kit-list { display: grid; gap: 10px; }
.kit-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.kit-item-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 4px;
  color: var(--text);
}
.kit-item-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.55;
}
.kit-note {
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  color: var(--text-dim);
  margin-top: 10px;
  line-height: 1.5;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  header { padding: 0 1rem; }
  main { padding: 1rem; }
  #grid-view { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .list-header, .list-row {
    grid-template-columns: 160px 1fr 55px 55px 55px 55px 55px 55px 70px;
  }
}

@media (max-width: 640px) {
  .modal-hero { height: auto; flex-direction: column; }
  .modal-hero-img { width: 100%; height: 200px; }
  .modal-hero-content { border-left: none; border-top: 1px solid var(--border); }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .list-header, .list-row {
    grid-template-columns: 130px 1fr 50px 50px 50px 50px 50px 50px 60px;
  }
  .list-col-head, .list-cell { padding: 8px 6px; font-size: 0.65rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo">DTM <span>UNIT DATABASE</span></div>
  <div class="header-controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search units..." autocomplete="off">
    </div>
    <div class="pill-group" id="filter-pills">
      <button class="pill active" data-filter="all">ALL</button>
      <button class="pill" data-filter="phys">PHYS</button>
      <button class="pill" data-filter="mgc">MGC</button>
      <button class="pill" data-filter="mix">MIXED</button>
      <button class="pill" data-filter="tank">TANK</button>
      <button class="pill" data-filter="sup">SUPPORT</button>
      <button class="pill el-aegis"  data-filter="Aegis">AEGIS</button>
      <button class="pill el-blitz"  data-filter="Blitz">BLITZ</button>
      <button class="pill el-mystic" data-filter="Mystic">MYSTIC</button>
      <button class="pill el-origin" data-filter="Origin">ORIGIN</button>
      <button class="pill el-ruin"   data-filter="Ruin">RUIN</button>
      <button class="pill el-veil"   data-filter="Veil">VEIL</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Grid view">

const MAX_STATS = { hp:8750, atk:810, mgc:860, ar:800, mr:800, spd:620 };
const K = 150, DEF_AVG = 530;

function baseVal(x) { return Math.round(x / 1.5 / 5) * 5; }
function estDmg(u) {
  const pa = u.atk > 200 ? u.atk*(u.atk/(u.atk+DEF_AVG+K)) : 0;
  const ma = u.mgc > 200 ? u.mgc*(u.mgc/(u.mgc+DEF_AVG+K)) : 0;
  return Math.round(Math.max(pa,ma));
}
function pct(val, key) { return Math.round(val / MAX_STATS[key] * 100); }

const EL_COLOR = { Aegis:'aegis', Blitz:'blitz', Mystic:'mystic', Origin:'origin', Ruin:'ruin', Veil:'veil' };
function elClass(el) { return EL_COLOR[el] || ''; }

function imgEl(u) {
  const src = buildImgUrl(u.img);
  const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

}

function listImgEl(u) {

function renderKit(name) {
  const entries = UNIT_KITS[name] || [];
  if (!entries.length) {
    return `<div class="kit-item"><div class="kit-item-title">Kit unavailable</div><div class="kit-item-desc">No kit text is currently stored for this unit.</div></div>`;
  }
  return `<div class="kit-list">` + entries.map(entry => {
    const title = Array.isArray(entry) ? entry[0] : 'Kit';
    const desc = Array.isArray(entry) ? entry[1] : String(entry);
    return `<div class="kit-item"><div class="kit-item-title">${title}</div><div class="kit-item-desc">${desc}</div></div>`;
  }).join('') + `</div>`;
}

// ── STATE ──
let currentFilter = 'all';
let currentSearch = '';
let currentView = 'grid';
let sortKey = 'hp';
let sortDir = -1;

function filtered() {
  return UNITS.filter(u => {
    const q = currentSearch.toLowerCase().trim();
    const kitText = (UNIT_KITS[u.name] || []).map(entry => Array.isArray(entry) ? entry.join(' ') : String(entry)).join(' ').toLowerCase();
    const matchSearch = !q || u.name.toLowerCase().includes(q) || u.role.toLowerCase().includes(q) || u.element.toLowerCase().includes(q) || kitText.includes(q);
    let matchFilter = true;
    if (currentFilter !== 'all') {
      if (['phys','mgc','mix','tank','sup'].includes(currentFilter)) {
        matchFilter = u.type === currentFilter;
      } else {
        matchFilter = u.element === currentFilter;
      }
    }
    return matchSearch && matchFilter;
  });
}

function sorted(arr) {
  return [...arr].sort((a,b) => {
    let va, vb;
    if (sortKey === 'name') { va = a.name; vb = b.name; return sortDir * (va > vb ? 1 : -1); }
    if (sortKey === 'dps')  { va = estDmg(a); vb = estDmg(b); }
    else { va = a[sortKey]; vb = b[sortKey]; }
    return sortDir * (va - vb);
  });
}

  const headerHtml = `<div class="list-header">

  </div>`;

  const rowsHtml = data.map((u, i) => {
    const dps = estDmg(u);
    function barCell(val, key) {
      const p = pct(val, key);
      const v = val === 0 ? '—' : val;
      return `<div class="list-cell"><div class="stat-bar-wrap"><span>${v}</span><div class="stat-bar"><div class="stat-bar-fill" style="width:${p}%"></div></div></div></div>`;
    }
    return `<div class="list-row" data-name="${u.name}" style="animation-delay:${i*0.02}s">
      <div class="list-cell">
        <div class="list-unit-info">
          <div class="list-thumb">${listImgEl(u)}</div>

      ${barCell(u.ar, 'ar')}
      ${barCell(u.mr, 'mr')}

    </div>`;
  }).join('');

  lv.innerHTML = headerHtml + rowsHtml;
  lv.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.key;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }

  lv.querySelectorAll('.list-row').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.name));
  });
}

        <div class="stat-block" style="flex:1;min-width:120px;">
          <div class="stat-block-label">DAMAGE TYPE</div>
          <div class="stat-block-val" style="font-size:0.9rem;">${u.atk > u.mgc ? 'Physical' : u.mgc > u.atk ? 'Magical' : 'Mixed'}</div>
          <div class="stat-block-base">primary offense</div>
        </div>
        <div class="stat-block" style="flex:1;min-width:120px;">
          <div class="stat-block-label">POSITION</div>
          <div class="stat-block-val" style="font-size:0.9rem;">${u.pos}</div>
          <div class="stat-block-base">preferred slot</div>
        </div>
      </div>
      <div style="font-size:0.72rem;color:var(--text-dim);line-height:1.5;font-family:'DM Mono',monospace;">
        Formula: mult × offense × (offense / (offense + defense + 150)) &nbsp;·&nbsp; Crit base: 1.5×
      </div>

      <div class="kit-section">
        <div class="section-label">UNIT KIT</div>
        ${renderKit(u.name)}
        <div class="kit-note">Search now matches names, roles, elements, and stored kit text. Image paths are encoded so filenames like GameOver &amp; Neos load correctly from the repo when this file is opened locally.</div>
      </div>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');

  // Animate bars after render
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.stat-row-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 80);
  });
}

// ── CONTROLS ──
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.getElementById('filter-pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

document.getElementById('btn-grid').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  document.getElementById('grid-view').style.display = '';
  document.getElementById('list-view').style.display = 'none';
  renderGrid();
});

document.getElementById('btn-list').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  document.getElementById('list-view').style.display = '';
  document.getElementById('grid-view').style.display = 'none';
  renderList();
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

function render() {
  renderMeta();
  if (currentView === 'grid') renderGrid();
  else renderList();
}

render();
</script>
</body>
</html>
